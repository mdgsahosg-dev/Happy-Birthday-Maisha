<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish!</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <canvas id="spiderweb-bg"></canvas>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2 style="font-family: 'Hind Siliguri', sans-serif;">নিরাপত্তা যাচাই 🔒</h2>
            <div class="inputs">
                <select id="day"></select>
                <select id="month"></select>
                <select id="year"></select>
            </div>
            <button id="login-btn">Click Here</button>
            <p id="error-msg" style="color: #ff4757; display: none; margin-top: 10px;">ভুল তারিখ! আবার চেষ্টা করো।</p>
        </div>
    </div>

    <div id="surprise-screen" class="screen" style="display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px;">
        <p class="top-inst" style="font-family: 'Hind Siliguri', sans-serif; margin-bottom: 20px;">খামটির ওপর ক্লিক করে চিঠিটি বের করো! ✨</p>
        
        <div class="container">
            <div class="envelope-wrapper" id="envelope">
                <div class="envelope">
                    <div class="letter">
                        <div class="text" id="typewriter-text" style="font-family: 'Hind Siliguri', sans-serif;"></div>
                    </div>
                </div>
                <div class="heart"></div>
            </div>
        </div>

        <div id="wish-box" style="width: 100%; max-width: 350px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; margin-top: 50px; border: 1px solid #0ff5;">
            <h3 style="color: #0ff; font-family: 'Hind Siliguri', sans-serif; font-size: 16px;">বন্ধুদের শুভেচ্ছাবার্তা 💬</h3>
            <div id="comments-container" style="height: 200px; overflow-y: auto; background: #111; padding: 10px; border-radius: 5px; margin-bottom: 10px; text-align: left; color: #fff; font-size: 13px;">
                <p style="color: #555;">উইশগুলো লোড হচ্ছে...</p>
            </div>
            <input type="text" id="guest-name" placeholder="তোমার নাম" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 5px; border: none;">
            <textarea id="guest-msg" placeholder="মাইশাকে উইশ করো..." style="width: 100%; padding: 8px; border-radius: 5px; border: none; height: 50px;"></textarea>
            <button id="send-wish" style="width: 100%; background: #0ff; color: #000; padding: 10px; border: none; border-radius: 5px; font-weight: bold; margin-top: 5px; cursor: pointer;">Post Wish</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
