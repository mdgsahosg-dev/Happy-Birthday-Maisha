<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish!</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="spiderweb-bg"></canvas>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2 style="font-family: 'Hind Siliguri', sans-serif;">নিরাপত্তা যাচাই 🔒</h2>
            <p style="font-family: 'Hind Siliguri', sans-serif; font-size: 14px; color: #ccc;">সঠিক জন্মতারিখ সিলেক্ট করো:</p>
            
            <div class="inputs">
                <select id="day"><option value="">Date</option></select>
                <select id="month"><option value="">Month</option></select>
                <select id="year"><option value="">Year</option></select>
            </div>
            
            <button id="login-btn">Click Here</button>
            <p id="error-msg" style="color: #ff4757; display: none; margin-top: 10px; font-family: 'Hind Siliguri', sans-serif;">ভুল তারিখ! আবার চেষ্টা করো।</p>
        </div>
    </div>

    <div id="surprise-screen" class="screen" style="display: none;">
        <p class="top-inst" style="font-family: 'Hind Siliguri', sans-serif;">খামটির ওপর ক্লিক করে চিঠিটি বের করো! ✨</p>
        <div class="container">
            <div class="envelope-wrapper" id="envelope">
                <div class="envelope">
                    <div class="letter">
                        <div class="text" id="typewriter-text" style="font-family: 'Hind Siliguri', sans-serif;"></div>
                    </div>
                </div>
                <div class="heart"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
